<!DOCTYPE html> <html lang="es">  <head>  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad RAS x WIE 2026</title>
    <style>
        /* Eliminamos los márgenes por defecto y aseguramos que ocupe todo el alto */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background: #ffff;
        }    

        /* AGREGADO: Estilos esenciales para que el preloader tape toda la pantalla */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #17031f; /* Fondo oscuro consistente con tu paleta */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Asegura que se posicione por encima de todo */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        /* Corrección para que no afecte a las líneas de la terminal */
        .contenedor p {
            margin: 10px 0;
            opacity: 0.8;
            line-height: 1.5;
        }

        .terminal {
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            background: rgba(0, 0, 0, 0.8); /* Un poco más oscuro para mejor contraste */
            padding: 25px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 204, 0.3); /* Borde cian sutil */
            width: 85%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        /* Estilo para las líneas de la terminal */
        .terminal p {
            margin: 12px 0;
            font-size: 0.95rem;
            color: #00ffcc; 
            opacity: 0;     
            overflow: hidden;
            white-space: nowrap;
            animation: aparecer 0.3s forwards; 
        }

        /* Control de tiempos */
        .terminal .linea-1 { animation-delay: 0.3s; }
        .terminal .linea-2 { animation-delay: 0.6s; }
        .terminal .linea-3 { animation-delay: 0.9s; }
        .terminal .linea-4 { animation-delay: 1.5s; }
        .terminal .linea-5 { animation-delay: 2.0s; }

        @keyframes aparecer {
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <div id="preloader">
        <div class="terminal">
            <p class="linea-1">> cd /TopSecreto</p>
            <p class="linea-2">> boot --init --secret</p>
            <p class="linea-2">> ERROR</p>
            <p class="linea-4">> sudo boot --init --secret</p>
            <p class="linea-5">> ...</p>
        </div>
    </div>

    <img src="assets/spinning-fish.gif" width="500">


    <audio id="musica-fondo" src="assets/musica_taller.mp3" loop></audio>

    <script>
        // Recuerda que el navegador bloquea el sonido automático.
        // Con esto, en cuanto el usuario haga un clic en cualquier parte de la pantalla (o sobre el GIF), la música arranca.
        window.addEventListener('click', function() {
            const musica = document.getElementById('musica-fondo');
            musica.play();
        }, { once: true }); // '{ once: true }' hace que el detector se apague después del primer clic
    </script>

    <script>
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            
            setTimeout(function() {
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
                
                setTimeout(() => {
                    preloader.remove();
                }, 500);

            }, 3500);
        });
    </script>
</body>
</html>
